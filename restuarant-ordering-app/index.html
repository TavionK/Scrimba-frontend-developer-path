<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="index.css" />
    <link rel="shortcut icon" href="#" type="image/x-icon" />
    <title>Tavion's Restaurant</title>
  </head>
  <body>
    <header>
      <div class="container">
        <h1>Tavion's Restaurant</h1>
        <h2>The best burgers and pizzas in town.</h2>
      </div>
    </header>
    <main>
      <div id="menu" class="container">
        <p>Default</p>
      </div>

      <div id="cart" class="container"></div>

      <div id="card-details" class="container card-details">
        <p class="bold block">Enter card details</p>
        <input
          type="text"
          name="name"
          id="name"
          placeholder="Enter your name"
        />
        <input
          class="block"
          type="number"
          name="card-number"
          id="card-number"
          placeholder="Enter card number"
        />
        <input
          class="block"
          type="number"
          name="cvv"
          id="cvv"
          placeholder="Enter CVV"
        />
        <button class="green-btn">Pay</button>
      </div>
    </main>
    <script src="index.js" type="module"></script>
  </body>
</html>
